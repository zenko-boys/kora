# fly.dev.toml — dev variant of fly.toml. Same config, different app name.
# Deploy with: fly deploy --config fly.dev.toml --app koraplay-api-dev
#
# See https://fly.io/docs/reference/configuration/ for details.

app = 'koraplay-api-dev'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health/ready"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
